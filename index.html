<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Girls Rock Fest II Scanner</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}

h1{
  margin-top:20px;
}

button{
  padding:15px 25px;
  font-size:18px;
  margin:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

#reader{
  width:100%;
  max-width:500px;
  margin:20px auto;
}

input{
  padding:15px;
  font-size:18px;
  width:85%;
  max-width:350px;
  text-align:center;
  border-radius:8px;
  border:none;
  margin-top:20px;
}

#resultado{
  margin-top:20px;
  font-size:20px;
}
</style>
</head>

<body>

<h1>Girls Rock Fest II</h1>

<button onclick="iniciarScanner()">INICIAR SCANNER</button>

<div id="reader"></div>

<hr>

<h3>Validación manual</h3>

<input id="codigoManual" placeholder="Código del boleto">

<br>

<button onclick="validarManual()">VALIDAR CÓDIGO</button>

<div id="resultado"></div>

<!-- ZONA ADMIN -->
<div style="
  margin-top:250px;
  border-top:1px solid #444;
  padding-top:25px;
">

  <div style="
    color:#888;
    margin-bottom:15px;
    font-size:14px;
  ">
    Administración
  </div>

  <button
    onclick="generarBoletos()"
    style="
      background:#ff4fd8;
      color:white;
      padding:15px 30px;
      font-size:18px;
      border:none;
      border-radius:10px;
      cursor:pointer;
    "
  >
    🎸 GENERAR BOLETOS
  </button>

</div>  

<script>

const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwsXMZAQbupoTbEPlo1sPwiZPH3b5nDxzfUVkNaqITdgxuO0AuDW28YNttCPG9q9dZsRQ/exec";
const TOKEN = "GRFSTAFF2026";

function validarCodigo(codigo){

  codigo = codigo.trim();

  if(!codigo){
    alert("Ingresa o escanea un código");
    return;
  }

  window.location.href =
    BACKEND_URL +
    "?codigo=" + encodeURIComponent(codigo) +
    "&token=" + encodeURIComponent(TOKEN);

}

function validarManual(){

  const codigo = document.getElementById("codigoManual").value;

  validarCodigo(codigo);

}

function iniciarScanner(){

  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: 250
    },
    (decodedText) => {

      html5QrCode.stop();

      validarCodigo(decodedText);

    }
  ).catch(err => {

    document.getElementById("resultado").innerHTML =
      "Error al abrir cámara: " + err;

  });

}

function generarBoletos(){

  const confirmar = confirm(
    "¿Deseas generar los boletos pendientes?"
  );

  if(!confirmar){
    return;
  }

  window.open(
    "https://script.google.com/macros/s/AKfycbwsXMZAQbupoTbEPlo1sPwiZPH3b5nDxzfUVkNaqITdgxuO0AuDW28YNttCPG9q9dZsRQ/exec?admin=generar&token=GRFSTAFF2026",
    "_blank"
  );

}  

</script>

</body>
</html>
